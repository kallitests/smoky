name: Smoky — Cypress Smoke Tests

# =============================================================================
# Trigger: repository_dispatch event sent by the Smoky Python agent.
# The agent encodes the generated Cypress spec file in base64 and sends it in
# the payload. This workflow decodes it, runs the tests, and uploads results
# as artifacts.
# =============================================================================

on:
  repository_dispatch:
    types: [smoky-trigger]

  # Allow manual trigger for debugging
  workflow_dispatch:
    inputs:
      issue_key:
        description: "Jira issue key (e.g. PROJ-142)"
        required: true
        default: "PROJ-001"
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options: [staging, preprod, production]

env:
  ISSUE_KEY:      ${{ github.event.client_payload.issue_key || github.event.inputs.issue_key }}
  SPEC_FILENAME:  ${{ github.event.client_payload.spec_file_name || 'manual.cy.ts' }}
  SPEC_B64:       ${{ github.event.client_payload.spec_file_b64 || '' }}
  PRIORITY:       ${{ github.event.client_payload.priority || 'Major' }}
  ENVIRONMENT:    ${{ github.event.client_payload.environment || github.event.inputs.environment || 'staging' }}

jobs:
  smoke-tests:
    name: "Smoky · ${{ github.event.client_payload.issue_key || github.event.inputs.issue_key }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout the Smoky repo
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Decode and write the Cypress spec file sent by the agent
      # -----------------------------------------------------------------------
      - name: Write spec file
        run: |
          mkdir -p cypress/e2e/generated
          if [ -n "$SPEC_B64" ]; then
            echo "$SPEC_B64" | base64 --decode > "cypress/e2e/generated/$SPEC_FILENAME"
            echo "✅ Spec file written: cypress/e2e/generated/$SPEC_FILENAME"
            cat "cypress/e2e/generated/$SPEC_FILENAME"
          else
            echo "⚠️ No spec file in payload — using existing specs"
          fi

      # -----------------------------------------------------------------------
      # 3. Set up Node.js (cached)
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # -----------------------------------------------------------------------
      # 4. Install Node dependencies (Cypress binary installs via postinstall)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # -----------------------------------------------------------------------
      # 5. Verify the Cypress binary is installed and runnable
      #    (ubuntu-latest ships Chrome preinstalled — no browser install step)
      # -----------------------------------------------------------------------
      - name: Verify Cypress
        run: npx cypress verify

      # -----------------------------------------------------------------------
      # 6. Run Cypress smoke tests
      #    grepTags uses "+" for AND — only tests tagged BOTH @smoke and the
      #    issue key run, via @cypress/grep
      # -----------------------------------------------------------------------
      - name: Run smoke tests
        id: run_tests
        env:
          BASE_URL: ${{ secrets[format('{0}_BASE_URL', env.ENVIRONMENT)] || secrets.STAGING_BASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npx cypress run \
            --browser chrome \
            --env grepTags="@smoke+@${{ env.ISSUE_KEY }}"
        continue-on-error: true  # Don't fail the job here — we publish results first

      # -----------------------------------------------------------------------
      # 7. Build smoky-results.json for the agent to consume
      #    (parses the merged mochawesome JSON from cypress-mochawesome-reporter)
      # -----------------------------------------------------------------------
      - name: Build results JSON
        if: always()
        run: |
          node -e "
          const fs = require('fs');
          const raw = fs.existsSync('cypress-report/mochawesome.json')
            ? JSON.parse(fs.readFileSync('cypress-report/mochawesome.json', 'utf8'))
            : { stats: { passes: 0, failures: 0, duration: 0 }, results: [] };

          const passed   = raw.stats?.passes   || 0;
          const failed   = raw.stats?.failures || 0;
          const duration = raw.stats?.duration || 0;

          function collectTests(suite) {
            let tests = (suite.tests || []).map(t => ({
              name:        t.title,
              status:      t.state === 'passed' ? 'passed' : 'failed',
              duration_ms: t.duration || 0,
              error:       t.state === 'passed' ? null : (t.err?.message || 'unknown'),
            }));
            for (const child of suite.suites || []) {
              tests = tests.concat(collectTests(child));
            }
            return tests;
          }

          const scenarios = (raw.results || []).flatMap(r =>
            (r.suites || []).flatMap(collectTests)
          );

          const results = {
            issue_key:   process.env.ISSUE_KEY,
            environment: process.env.ENVIRONMENT,
            passed,
            failed,
            total:       passed + failed,
            duration_ms: duration,
            conclusion:  failed === 0 ? 'success' : 'failure',
            scenarios,
            report_url:  'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}',
          };

          fs.mkdirSync('smoky-results', { recursive: true });
          fs.writeFileSync('smoky-results/results.json', JSON.stringify(results, null, 2));
          console.log('Results:', JSON.stringify(results, null, 2));
          "

      # -----------------------------------------------------------------------
      # 8. Upload HTML report as artifact (viewable in GitHub UI)
      # -----------------------------------------------------------------------
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-report-${{ env.ISSUE_KEY }}
          path: cypress-report/
          retention-days: 14

      # -----------------------------------------------------------------------
      # 9. Upload smoky-results.json (consumed by the Python agent)
      # -----------------------------------------------------------------------
      - name: Upload smoky-results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoky-results
          path: smoky-results/results.json
          retention-days: 7

      # -----------------------------------------------------------------------
      # 10. Upload screenshots and videos on failure
      # -----------------------------------------------------------------------
      - name: Upload failure artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-artifacts-${{ env.ISSUE_KEY }}
          path: |
            cypress/screenshots/**/*.png
            cypress/videos/**/*.mp4
          retention-days: 7

      # -----------------------------------------------------------------------
      # 11. Fail the job if tests failed (after artifacts are uploaded)
      # -------------------------------------------